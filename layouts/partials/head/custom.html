<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">

<style>
    /* 使用 html 和 body 标签，并加上 !important 确保最高优先级 */
    html, body, p, div, span {
        font-family: "Lora", "Noto Sans SC", serif !important;
    }

    /* 单独确保标题也变化 */
    h1, h2, h3, h4, h5, h6, .article-title, .widget-title {
        font-family: "Lora", "Noto Sans SC", serif !important;
    }

    /* 稍微调整一下字重，Lora 400 比较纤细，如果觉得淡可以改用 500 */
    body {
        font-weight: 400;
        line-height: 1.8;
    }

  :root {
        /* 调整正文颜色变量，Stack主题通常使用这个变量 */
        --article-text-color: #444444; 
    }

    /* 强力覆盖：确保文章内容、侧边栏描述等都变淡一点 */
    body, .article-content, .article-summary {
        color: #444444 !important;
        -webkit-font-smoothing: antialiased; /* 让字体边缘更圆滑 */
    }


</style>
